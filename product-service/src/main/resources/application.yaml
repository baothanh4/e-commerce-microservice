server:
  port: 8082

spring:
  application:
    name: product-service

  datasource:
    url: jdbc:postgresql://localhost:5432/productdb
    username: postgres
    password: 12345

  jpa:
    hibernate:
      ddl-auto: create-only
    show-sql: true
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: Y2hhbmdlLXRoaXMtdG8teW91ci1vd24tc2VjcmV0LWtleS1pbi1wcm9kdWN0aW9uLWVudmlyb25tZW50
  expiration: 86400000

aws:
  s3:
    bucket: ${AWS_BUCKET_NAME:dummy-bucket}
    folder: ${AWS_FOLDER:dummy-folder}
    region: ${AWS_REGION:us-east-1}
    access-key: ${AWS_ACCESS_KEY:dummy-access-key}
    secret-key: ${AWS_SECRET_KEY:dummy-secret-key}

